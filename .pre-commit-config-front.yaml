# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
fail_fast: true
default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
        args: [--allow-multiple-documents]
      - id: check-json
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        name: check commit message format
        stages: [commit-msg]
        args: [--strict]
  - repo: local
    hooks:
      - id: lint
        stages: [pre-commit]
        name: format code
        language: system
        always_run: true
        pass_filenames: false
        entry: npm run lint:fix
      - id: test
        stages: [pre-commit]
        name: run tests
        language: system
        always_run: true
        pass_filenames: false
        entry: npm run test
      - id: build
        stages: [pre-commit]
        name: build library
        language: system
        always_run: true
        pass_filenames: false
        entry: npm run build
